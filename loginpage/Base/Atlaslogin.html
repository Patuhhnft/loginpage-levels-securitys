<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtlasBank</title>
  <link rel="icon" href="../Packs/Resource/Imageorganizer/Icons/atlasicon.png">
  <link rel="stylesheet" href="../Packs/Behavior/login.css" />
</head>
<body>
    <!-- Logo -->
     <a href="../../landingpage/Base/Atlashub.html">
      <img src="../Packs/Resource/Imageorganizer/Icons/atlasicon.png" alt="Logo da empresa AtlasBank">
    </a>
  <div class="container">
    <div class="logo">Atlas Bank</div>
    <form>
      <div class="input-group">
        <label for="cpf">Digite seu CPF:</label>
        <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="Enter your password" required id="password"/>
      </div>

      <button class="btn" type="button" id="acess" onclick="logar()">Login</button>
      <div class="links">
        <a href="#">Esqueceu sua senha?</a>
        <a href="#">Cadastre-se</a>
      </div>
    </form>
  </div>
</body>
<script src="../Packs/Behavior/login.js"></script>
</html>
