<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasBank</title>
    <link rel="icon" href="../Packs/Resource/Imagens/atlasicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../Packs/Behavior/hub.css">
    <link rel="stylesheet" href="../Packs/Resource/fontes/fonts.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');
    </style>
</head>
<body>
    <!-- section da primeira visão do usuário -->
    <section id="primarysight">
        
        <!-- divisão 1 - imagem e logo -->
         <div id="atu">
        <div id="imagesight">
        </div>

        <!-- divisão 2 - ferramentas de uso -->
        <div id="hubsight">
            <!-- onde o usuário pode acessar as ferramentas de uso do banco, como cartões, empréstimos, poupança e investimentos -->
            <header id="selecoestop">
                <div class="option" style="width: 21.5%;">
                    <a href="" class="selected">CARTÕES</a>
                </div>
                <div class="option">
                    <a href="">EMPRÉSTIMOS</a>
                </div>
                <div class="option" style="width: 25.16%;">
                    <a href="">POUPANÇA</a>
                </div>
                <div class="option">
                    <a href="">INVESTIMENTOS</a>
                </div>
            </header>
            <!-- Logo abaixo da seleção de ferramentas, o usuário pode acessar as informações sobre cartões, empréstimos, poupança e investimentos. Cada opção leva a uma página específica onde o usuário pode obter mais informações e realizar ações relacionadas a cada serviço. -->
            <div class="creditcards">
                <div class="cartoes">
                    <div class="cartao">
                        <h3 id="cardcategoria">CREDIT</h3>
                        <div class="textocomp">
                            <h3 id="textoref" class="cardesc">NOSSO CARTÃO</h3>
                            <h4 id="nomedocartao" class="cardcreditname">FIREBLACK</h4>
                        </div>
                        <img src="../Packs/Resource/Imagens/cartaodark_1.png" alt="Cartão de Crédito AtlasBank">
                        <div class="infomais">
                            <p class="limite" id="limited">Limite inicial de 5.000</p>
                            <p class="milhas" id="milhasd">Ganhe milhas</p>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Parte onde o usuário pode acessar as informações sobre cartões, empréstimos, poupança e investimentos. Cada opção leva a uma página específica onde o usuário pode obter mais informações e realizar ações relacionadas a cada serviço. -->
             <!-- Benefícios e adquirir cartão -->
            <div id="selecoescard">
                <div class="maisinfo" alt="Botão para mais informações">
                    <a href="https://www.youtube.com">Nossos benefícios</a>
                </div>
                <!-- Aquisição do cartão -->
                <div class="adquirir">
                    <div class="palavra">
                        <h3>ADQUIRIR</h3>
                    </div>

                    <div id="adquirirproduto" alt="Botão para adiquirir o produto">
                        <a href="https://www.youtube.com">CLIQUE AQUI</a>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </section>
</body>
</html>
